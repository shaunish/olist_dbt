version: 2

models:
  - name: stg_order_reviews
    description: "One row per order. Cleaned and renamed from raw source."
    columns:
      - name: order_id
        description: "Primary key. Unique identifier for each order."
        tests:
          - not_null
      - name: review_id
        description: "Review ID."
        tests:
          - not_null
      - name: review_score
        description: "review score from 1 to 5"
        tests:
          - not_null
      - name: review_title
        description: "Title of review"
      - name: review_text
        description: "Text of review."
      - name: reviewed_at
        description: "Time of review."
      - name: answered_at
        description: "Time review was responded to."
    tests:
      - unique:
          column_name: "order_id || '-' || review_id"

